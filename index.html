<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8" />
    <title>My cool website</title>
  </head>
  <body>
    <!--
      All the interactions with the below elements
      happen in main.js
    -->

    <h2>Todo List</h2>
    <div id="todo-app">
      <input id="new-todo-title" type="text" placeholder="Enter new todo..." />
      <button id="add-todo-button">Add Todo</button>
      <ul id="todo-list"></ul>
    </div>
    <hr />
    <p>Type in your name here to get an unexpected message.</p>
    <input id="name-field" type="text" value="" />
    <button id="submit-button">Send to the server!</button>
    <p>Your message from the server:</p>
    <p id="message-area"></p>

    <script type="text/javascript" src="main.js"></script>
  </body>
</html>
