<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8" />
    <title>My cool website</title>
    <style>
      body {
        font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        background: #f6f8fa;
        margin: 0;
        padding: 0;
      }
      #todo-app {
        max-width: 400px;
        margin: 40px auto;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1.5px 4px rgba(0,0,0,0.04);
        padding: 32px 24px 24px 24px;
      }
      #todo-app h2 {
        margin-top: 0;
        text-align: center;
        font-weight: 600;
        color: #222;
      }
      #new-todo-title {
        width: 70%;
        padding: 10px 12px;
        border: 1.5px solid #d1d5db;
        border-radius: 8px;
        font-size: 1rem;
        margin-right: 8px;
        outline: none;
        transition: border 0.2s;
      }
      #new-todo-title:focus {
        border-color: #6c63ff;
      }
      #add-todo-button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        background: #6c63ff;
        color: #fff;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(108,99,255,0.08);
        transition: background 0.2s, box-shadow 0.2s;
      }
      #add-todo-button:hover {
        background: #554ee0;
        box-shadow: 0 4px 16px rgba(108,99,255,0.16);
      }
      #todo-list {
        list-style: none;
        padding: 0;
        margin: 24px 0 0 0;
      }
      #todo-list li {
        display: flex;
        align-items: center;
        background: #f3f4f6;
        border-radius: 10px;
        margin-bottom: 14px;
        padding: 12px 14px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        transition: background 0.2s;
      }
      #todo-list li:last-child {
        margin-bottom: 0;
      }
      .todo-title {
        flex: 1;
        font-size: 1.08rem;
        font-weight: 500;
        margin-left: 12px;
        letter-spacing: 0.01em;
        display: flex;
        align-items: center;
      }
      .todo-title.completed {
        color: #1db954;
      }
      .todo-title.incomplete {
        color: #888;
      }
      .todo-icon {
        margin-right: 8px;
        font-size: 1.1em;
        display: inline-block;
        width: 1.2em;
        text-align: center;
      }
      .delete-todo {
        padding: 7px 14px;
        border: none;
        border-radius: 7px;
        background: #ff4d4f;
        color: #fff;
        font-weight: 500;
        font-size: 0.98rem;
        cursor: pointer;
        margin-left: 10px;
        box-shadow: 0 1px 4px rgba(255,77,79,0.08);
        transition: background 0.2s, box-shadow 0.2s;
      }
      .delete-todo:hover {
        background: #d9363e;
        box-shadow: 0 2px 8px rgba(255,77,79,0.16);
      }
      /* Custom checkbox */
      .toggle-completed {
        appearance: none;
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        border: 2px solid #bdbdbd;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        position: relative;
        outline: none;
        transition: border 0.2s, box-shadow 0.2s;
        margin-right: 4px;
      }
      .toggle-completed:checked {
        border-color: #1db954;
        background: #eaffea;
      }
      .toggle-completed:checked::after {
        content: '\2714';
        color: #1db954;
        font-size: 1.1em;
        position: absolute;
        left: 3px;
        top: 0px;
      }
      .toggle-completed:focus {
        box-shadow: 0 0 0 2px #6c63ff33;
      }
      @media (max-width: 500px) {
        #todo-app {
          max-width: 98vw;
          padding: 18px 4vw 14px 4vw;
        }
        #new-todo-title {
          width: 60%;
        }
      }
    </style>
  </head>
  <body>
    <!--
      All the interactions with the below elements
      happen in main.js
    -->

    <h2>Todo List</h2>
    <div id="todo-app">
      <input id="new-todo-title" type="text" placeholder="Enter new todo..." />
      <button id="add-todo-button">Add Todo</button>
      <ul id="todo-list"></ul>
    </div>


    <script type="text/javascript" src="main.js"></script>
  </body>
</html>
